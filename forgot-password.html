<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choffing - Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="brand">Choffing</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="cart.html">Orders <span class="cart-count">0</span></a>
            <div id="nav-auth-links" style="display:inline;">
                <a href="login.html">Login</a>
                <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </nav>

    <div class="container main-content">
        <div class="auth-container card">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p>Enter your email to receive a reset link.</p>
            </div>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>

                <p id="errorText" class="error-text"></p>

                <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Send Reset
                    Link</button>
            </form>

            <div class="auth-links">
                Remember your password? <a href="login.html">Log In</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/store.js"></script>
</body>

</html>
