<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choffing - Sign Up</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="brand">Choffing</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="cart.html">Orders <span class="cart-count">0</span></a>
            <div id="nav-auth-links" style="display:inline;">
                <a href="login.html">Login</a>
            </div>
        </div>
    </nav>

    <div class="container main-content">
        <div class="auth-container card">
            <div class="auth-header">
                <h2>Create an Account</h2>
                <p>Join us to start shopping.</p>
            </div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="johndoe">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label for="location">Location / Address</label>
                    <input type="text" id="location" required placeholder="Algiers, Center">
                </div>

                <div class="form-group">
                    <label for="genre">Genre (Gender)</label>
                    <select id="genre" required>
                        <option value="" disabled selected>Select your genre...</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" required placeholder="••••••••">
                </div>

                <p id="errorText" class="error-text"></p>

                <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Sign Up</button>
            </form>

            <div class="auth-links">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/store.js"></script>
</body>

</html>
