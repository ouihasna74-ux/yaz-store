<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choffing - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar">
        <a href="index.html" class="brand">Choffing</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="cart.html">Orders <span class="cart-count">0</span></a>
            <div id="nav-auth-links" style="display:inline;">
                <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </nav>

    <div class="container main-content">
        <div class="auth-container card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Please enter your details to sign in.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <p id="errorText" class="error-text"></p>

                <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Sign In</button>
            </form>

            <div class="auth-links">
                <a href="forgot-password.html">Forgot Password?</a>
                <span>|</span>
                <a href="signup.html">Create an Account</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/store.js"></script>
</body>

</html>
